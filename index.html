<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otimiza AI — Links</title>
  <link rel="icon" type="image/png" href="otimiza-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #071520;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(32, 130, 160, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 10%, rgba(18, 90, 120, 0.45) 0%, transparent 50%),
        radial-gradient(ellipse at 10% 60%, rgba(14, 100, 130, 0.35) 0%, transparent 45%),
        radial-gradient(ellipse at 60% 80%, rgba(5, 40, 65, 0.6) 0%, transparent 50%);
      background-attachment: fixed;
      position: relative;
      overflow: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px 180px;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .logo-wrap {
      margin-bottom: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-wrap img {
      width: 200px;
      filter: drop-shadow(0 0 24px rgba(60, 180, 210, 0.25));
    }

    .tagline {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 22px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }

    .link-btn:hover {
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(60, 190, 220, 0.35);
      box-shadow: 0 0 24px rgba(40, 160, 200, 0.15);
      transform: translateY(-2px);
    }

    .link-btn:active {
      transform: translateY(0px);
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg {
      width: 20px;
      height: 20px;
    }

    .icon-whatsapp {
      background: rgba(37, 211, 102, 0.15);
    }

    .icon-email {
      background: rgba(60, 160, 220, 0.15);
    }

    .icon-site {
      background: rgba(180, 130, 255, 0.15);
    }

    .icon-myclinica {
      background: rgba(255, 160, 80, 0.15);
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .btn-label {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
    }

    .btn-sub {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="logo.png" alt="Otimiza AI" />
      <span class="tagline">Automação com inteligência</span>
    </div>

    <div class="links">
      <!-- WhatsApp -->
      <a class="link-btn" href="https://wa.me/5588988557247" target="_blank" rel="noopener">
        <div class="icon icon-whatsapp">
          <svg viewBox="0 0 24 24" fill="currentColor" style="color:#25D366">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">WhatsApp</span>
          <span class="btn-sub">(88) 98855-7247</span>
        </div>
      </a>

      <!-- Email -->
      <a class="link-btn" href="mailto:contato@otimiza.net.br" target="_blank" rel="noopener">
        <div class="icon icon-email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#3ab0dc">
            <rect x="2" y="4" width="20" height="16" rx="3" ry="3"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">E-mail</span>
          <span class="btn-sub">contato@otimiza.net.br</span>
        </div>
      </a>

      <!-- Site -->
      <a class="link-btn" href="https://otimizai.net.br/" target="_blank" rel="noopener">
        <div class="icon icon-site">
          <img src="otimiza-icon.png" alt="Otimiza AI" style="width:36px;height:36px;object-fit:contain;" />
        </div>
        <div class="btn-text">
          <span class="btn-label">Nosso Site</span>
          <span class="btn-sub">otimizai.net.br</span>
        </div>
      </a>
      <!-- My Clinica -->
      <a class="link-btn" href="https://site.myclinica.online/" target="_blank" rel="noopener">
        <div class="icon icon-myclinica">
          <img src="myclinica-logo.png" alt="MyClinica" style="width:36px;height:36px;object-fit:contain;border-radius:8px;" />
        </div>
        <div class="btn-text">
          <span class="btn-label">Sistema MyClinica 💙</span>
          <span class="btn-sub">site.myclinica.online</span>
        </div>
      </a>
    </div>

    <p class="footer">© 2026 Otimiza AI</p>
  </div>
</body>
</html>
